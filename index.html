<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vera Sakhno - Software QA | 8+ Years | Manual Testing Expert | Quality Analyst</title>
    <meta name="description" content="Detail-oriented QA Engineer with 8+ years in Web, Mobile, and API testing. Expert in E-commerce, manual testing, requirements analysis, and risk assessment.">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/png" href="images/egg.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-top">
        <div id="profile-name"></div>
        <nav class="language-switcher" aria-label="Language switcher">
          <button
            id="egg-trigger"
            class="egg-button"
            type="button"
            aria-hidden="true"
            tabindex="-1"
          >
            <img src="images/egg.png" alt="" />
          </button>
          <button id="lang-en" class="glass-button" type="button" data-lang="en">EN</button>
          <button id="lang-ru" class="glass-button" type="button" data-lang="ru">RU</button>
        </nav>
      </div>
      <div id="profile-role"></div>
    </header>
    <main id="app">
      <section id="contact" class="glass-panel"></section>
      <section id="summary" class="glass-panel"></section>
      <section id="keySkills" class="glass-panel"></section>
      <section id="experience" class="glass-panel"></section>
      <section id="about" class="glass-panel"></section>
      <section id="preferences" class="glass-panel"></section>
    </main>
    <footer class="page-footer">
      <button id="scroll-top" class="glass-button" type="button" aria-label="Scroll to top">^</button>
    </footer>
    <div id="egg-modal-overlay" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="egg-modal-title">
        <button id="egg-modal-close" class="modal-close" type="button" aria-label="Close">×</button>
        <pre id="egg-modal-title"><code>if (cv.match(role.requirements)) {
    interview.schedule(now)
    me.happy()
}</code></pre>
      </div>
    </div>
    <script src="renderer.js"></script>
    <script src="accordion.js"></script>
    <script src="langSwitcher.js"></script>
    <script src="easterEgg.js"></script>
    <script src="scrollTop.js"></script>
  </body>
</html>
