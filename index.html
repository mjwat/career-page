<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Career Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-top">
        <div id="profile-name"></div>
        <nav aria-label="Language switcher">
          <button id="lang-en" type="button" data-lang="en">EN</button>
          <button id="lang-ru" type="button" data-lang="ru">RU</button>
        </nav>
      </div>
      <div id="profile-role"></div>
    </header>
    <main id="app">
      <section id="contact"></section>
      <section id="summary"></section>
      <section id="keySkills"></section>
      <section id="experience"></section>
      <section id="about"></section>
      <section id="education"></section>
      <section id="languages"></section>
      <section id="preferences"></section>
    </main>
    <script src="renderer.js"></script>
    <script src="accordion.js"></script>
    <script src="langSwitcher.js"></script>
  </body>
</html>
